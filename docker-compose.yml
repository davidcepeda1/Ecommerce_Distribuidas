# =============================================================================
#  docker-compose.yml — MVP Avance 1 (Tarea 1)
#  Gateway + 3 microservicios + Redis (eventos) + Postgres.
#
#  Levantar:   docker compose up -d --build
#  Ver:        docker compose ps
#  Probar:     curl http://localhost:3000/api/productos
# =============================================================================
services:

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    volumes:
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql

  # Broker de EVENTOS (camino asíncrono de la Tarea 1).
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_EXTERNAL_PORT}:6379"
    restart: unless-stopped

  # SEGUNDO transporte de mensajería (Tarea 2). Panel de gestión en :15672 (guest/guest).
  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "${RABBITMQ_PORT}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT}:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # --- Microservicio B (segundo salto de la cadena síncrona) ---
  # Se levanta primero: MS Pedidos depende de él para validar/reservar stock.
  svc-productos:
    build:
      context: .
      dockerfile: apps/productos/Dockerfile
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${PRODUCTOS_DB_NAME}
      PORT: ${PRODUCTOS_PORT}                    # TCP (Avance 1)
      GRPC_PORT: ${PRODUCTOS_GRPC_PORT}          # gRPC (Avance 2)
      RABBITMQ_URL: ${RABBITMQ_URL}
      UMBRAL_STOCK_BAJO: ${UMBRAL_STOCK_BAJO}    # bajo este umbral publica 'stock.bajo'
      # Simula trabajo real downstream (ej. consultar inventario externo).
      # Sin esto, el round-trip TCP local (~1-2ms) no deja ver la acumulación.
      LATENCIA_SIMULADA_MS: ${PRODUCTOS_LATENCIA_MS}
    ports:
      - "${PRODUCTOS_PORT}:${PRODUCTOS_PORT}"
      - "${PRODUCTOS_GRPC_PORT}:${PRODUCTOS_GRPC_PORT}"    # TCP + gRPC
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  # --- Microservicio A (inicia la cadena síncrona por TCP + publica en Redis) ---
  svc-pedidos:
    build:
      context: .
      dockerfile: apps/pedidos/Dockerfile
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${PEDIDOS_DB_NAME}
      PORT: ${PEDIDOS_PORT}
      SVC_PRODUCTOS_HOST: ${SVC_PRODUCTOS_HOST}   # destino del salto síncrono (TCP)
      SVC_PRODUCTOS_PORT: ${PRODUCTOS_PORT}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
    ports:
      - "${PEDIDOS_EXTERNAL_PORT}:${PEDIDOS_PORT}"                 # puerto TCP expuesto solo para depurar
    depends_on:
      db:
        condition: service_healthy
      svc-productos:
        condition: service_started
      redis:
        condition: service_started
    restart: unless-stopped

  # --- Microservicio C (consumidor de EVENTOS: Redis + RabbitMQ) ---
  svc-notificaciones:
    build:
      context: .
      dockerfile: apps/notificaciones/Dockerfile
    environment:
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      RABBITMQ_URL: ${RABBITMQ_URL}   # 2.º transporte (Avance 2)
      # Simula trabajo real de envío (email/push). No afecta al emisor porque
      # este microservicio se consume vía evento, no vía espera síncrona.
      LATENCIA_SIMULADA_MS: ${NOTIFICACIONES_LATENCIA_MS}
    depends_on:
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  # --- API Gateway (punto único de entrada, expone HTTP) ---
  gateway:
    build:
      context: .
      dockerfile: apps/gateway/Dockerfile
    environment:
      PORT: ${GATEWAY_PORT}
      SVC_PEDIDOS_HOST: ${SVC_PEDIDOS_HOST}
      SVC_PEDIDOS_PORT: ${PEDIDOS_PORT}
      SVC_PRODUCTOS_HOST: ${SVC_PRODUCTOS_HOST}
      SVC_PRODUCTOS_PORT: ${PRODUCTOS_PORT}
      GRPC_PRODUCTOS_URL: ${GRPC_PRODUCTOS_URL}            # cliente gRPC (Avance 2)
    ports:
      - "${GATEWAY_PORT}:${GATEWAY_PORT}"                 # el sistema se prueba en http://localhost:3000
    depends_on:
      svc-pedidos:
        condition: service_started
      svc-productos:
        condition: service_started
    restart: unless-stopped